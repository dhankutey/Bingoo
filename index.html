<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Web Bingo</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4a90e2">
</head>
<body>

    <h1>Bingo Game</h1>

    <div class="controls">
        <label for="gridSize">Choose Grid Size: </label>
        <select id="gridSize">
            <option value="5">5 x 5 (1-25)</option>
            <option value="7">7 x 7 (1-49)</option>
            <option value="10">10 x 10 (1-100)</option>
        </select>
    </div>

    <div class="bingo-header">
        <div class="letter" id="l-0">B</div>
        <div class="letter" id="l-1">I</div>
        <div class="letter" id="l-2">N</div>
        <div class="letter" id="l-3">G</div>
        <div class="letter" id="l-4">O</div>
    </div>

    <div id="grid" class="grid-container"></div>

    <div class="modal-overlay" id="winModal">
        <div class="modal">
            <h2>Perfect Bingo! 🎉</h2>
            <p>You have completed 5 lines successfully.</p>
            <button id="playAgainBtn">Play Again</button>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker registered successfully.'))
                    .catch(err => console.log('Service Worker registration failed:', err));
            });
        }
    </script>
</body>
</html>
